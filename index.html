<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-header">
      <button id="new-chat-btn" title="New chat">+ New chat</button>
      <button id="collapse-btn" title="Collapse sidebar">⟨</button>
    </div>
    <nav id="convo-list"></nav>
    <div class="sidebar-footer">
      <span class="footer-note">Powered by <code>claude -p</code></span>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <button id="expand-btn" class="hidden" title="Expand sidebar">⟩</button>
      <div id="model-picker">
        <button id="model-btn" title="Pick a model">Select model…</button>
        <div id="model-dropdown" class="hidden">
          <input id="model-search" type="text" placeholder="Search models…" autocomplete="off">
          <div id="model-list"></div>
        </div>
      </div>
      <label id="reasoning-label" title="Effort level (claude --effort)">
        🧠
        <select id="reasoning-select">
          <option value="default">Default</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="xhigh">X-High</option>
          <option value="max">Max</option>
        </select>
      </label>
    </header>

    <details id="system-prompt-box">
      <summary>System prompt <span id="system-prompt-hint"></span></summary>
      <textarea id="system-prompt" placeholder="You are a helpful assistant…" rows="5"></textarea>
    </details>

    <section id="messages"></section>

    <footer id="composer">
      <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="3"></textarea>
      <div class="composer-buttons">
        <button id="send-btn" title="Send">Send</button>
        <button id="stop-btn" class="hidden" title="Stop streaming">■ Stop</button>
      </div>
    </footer>
  </main>
</div>

<script src="vendor/marked.min.js"></script>
<script src="vendor/purify.min.js"></script>
<script src="js/markdown.js"></script>
<script src="js/store.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
